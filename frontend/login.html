<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fresh Veggies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1200&q=80') center/cover;
        }
        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        .login-logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .login-container p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .g_id_signin {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .back-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo"><i class="fa-solid fa-leaf"></i> Fresh Veggies</div>
        <p>Login to track your orders faster.</p>

        <!-- Google Identity Services -->
        <div id="g_id_onload"
             data-client_id="414409002678-ko14qgdldjvpk1b93089t1tbvus4a2mq.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="continue_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
    </div>

    <script>
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleCredentialResponse(response) {
            // Decoding the jwt token to get user info 
            const responsePayload = decodeJwtResponse(response.credential);
            
            const userData = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                googleId: responsePayload.sub
            };

            // Sync with backend
            try {
                // Auto-detect API base URL
                const API_BASE = (window.location.port === '5000') ? '' : 'http://localhost:5000';
                
                const res = await fetch(`${API_BASE}/api/users/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (res.ok) {
                    const savedUser = await res.json();
                    localStorage.setItem('userAuth', JSON.stringify({ ...savedUser, loggedIn: true }));
                } else {
                    console.error('Backend sync failed');
                    // Fallback to local storage if backend fails
                    localStorage.setItem('userAuth', JSON.stringify({ ...userData, loggedIn: true }));
                }
            } catch (err) {
                console.error('Network error during sync:', err);
                localStorage.setItem('userAuth', JSON.stringify({ ...userData, loggedIn: true }));
            }
            
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
