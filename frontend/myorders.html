<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Fresh Veggies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .orders-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .orders-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media (min-width: 768px) {
            .orders-card {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
            }
        }
        .order-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .order-id {
            color: var(--text-muted);
            font-size: 14px;
        }
        .order-items {
            flex-grow: 1;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 15px;
        }
        .order-total {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 18px;
            margin-top: 15px;
            text-align: right;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-placed { background: #fff3e0; color: #f57c00; }
        .status-accepted { background: #e1bee7; color: #8e24aa; }
        .status-started { background: #e3f2fd; color: #1976d2; }
        .status-arrived { background: #fff9c4; color: #fbc02d; }
        .status-delivered { background: #e8f5e9; color: var(--primary-dark); }
        .status-cancelled { background: #ffebee; color: #d32f2f; }
        
        .empty-orders {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-top">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i> Fresh Veggies
            </div>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>
        <div class="navbar-bottom">
            <div class="nav-links" id="navLinksContainer">
                <a href="index.html">Home</a>
                <a href="myorders.html" class="active" id="myOrdersLinkNav" style="display:none;">My Orders</a>
                <a href="admin.html" id="adminBtnNav" class="btn-admin" style="display:none;">Admin</a>
                <a href="login.html" id="loginBtnNav">Login</a>
                <a href="cart.html" class="cart-icon-nav">
                    <i class="fa-solid fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="orders-container">
        <h2 class="page-header"><i class="fa-solid fa-box-open"></i> My Orders</h2>
        
        <div id="ordersList">
            <div class="empty-orders">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 15px; color: var(--primary-color)"></i>
                <p>Loading your past orders...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadUserOrders();
        });

        async function loadUserOrders() {
            const userAuth = JSON.parse(localStorage.getItem('userAuth'));
            const container = document.getElementById('ordersList');

            if (!userAuth || !userAuth.loggedIn) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fa-solid fa-lock" style="font-size: 3rem; margin-bottom: 15px; color: var(--text-muted)"></i>
                        <h3>Login Required</h3>
                        <p style="margin-top: 10px;">Please <a href="login.html" style="color:var(--primary-color)">Sign in</a> to view your order history.</p>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/orders/user/${userAuth.email}`);
                const orders = await res.json();

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-orders">
                            <i class="fa-solid fa-basket-shopping" style="font-size: 3rem; margin-bottom: 15px; color: var(--text-muted)"></i>
                            <h3>No Orders Found</h3>
                            <p style="margin-top: 10px;">You haven't placed any orders yet. <a href="index.html" style="color:var(--primary-color)">Start shopping!</a></p>
                        </div>`;
                    return;
                }

                container.innerHTML = '';
                orders.forEach(order => {
                    const date = new Date(order.createdAt).toLocaleString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    
                    let statusClass = 'status-placed';
                    let statusIcon = 'fa-clock';
                    
                    if (order.status === 'Accepted') {
                        statusClass = 'status-accepted';
                        statusIcon = 'fa-thumbs-up';
                    } else if (order.status === 'Started') {
                        statusClass = 'status-started';
                        statusIcon = 'fa-truck-fast';
                    } else if (order.status === 'Arrived') {
                        statusClass = 'status-arrived';
                        statusIcon = 'fa-location-dot';
                    } else if (order.status === 'Delivered') {
                        statusClass = 'status-delivered';
                        statusIcon = 'fa-check-circle';
                    } else if (order.status === 'Cancelled') {
                        statusClass = 'status-cancelled';
                        statusIcon = 'fa-ban';
                    }

                    const itemsHtml = order.items.map(item => `
                        <div class="order-item">
                            <span>${item.name} (${item.quantity}kg)</span>
                            <span>₹${item.totalPrice}</span>
                        </div>
                    `).join('');

                    const el = document.createElement('div');
                    el.className = 'orders-card';
                    el.innerHTML = `
                        <div style="flex: 1;">
                            <div class="order-header">
                                <span class="order-id">Placed: ${date} | Order #.....${order._id.substring(order._id.length - 6)}</span>
                            </div>
                            <div class="order-items">
                                ${itemsHtml}
                            </div>
                        </div>
                        <div style="min-width: 200px; text-align: right;">
                            <div class="status-badge ${statusClass}">
                                <i class="fa-solid ${statusIcon}"></i> ${order.status}
                            </div>
                            <div class="order-total">
                                Total: ₹${order.totalPrice}
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            } catch(e) {
                container.innerHTML = '<div class="empty-orders">Error loading orders.</div>';
            }
        }
    </script>
</body>
</html>
